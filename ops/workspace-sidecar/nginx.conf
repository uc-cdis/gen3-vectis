# NGINX sidecar for proxying WebSocket and workspace API calls
# Forwards authenticated workspace requests to the backend, handles WS upgrades.

upstream workspace_backend {
  server host.docker.internal:18888;
}

upstream workspace_app {
  server host.docker.internal:3000;
}

server {
  listen 8890;
  server_name localhost;
  client_max_body_size 500m;

  location / {
    proxy_pass http://workspace_app;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/api/workspace/gateway/(.*)$ {
    auth_request off;
    proxy_pass http://workspace_backend/$1;
    proxy_redirect off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }
}
